{% extends "base.html" %}

{% block title %}Edit Game Night{% endblock %}

{% block content %}
<h1>Edit Game Night</h1>

<form action="{{ url_for('game_night.edit_game_night', game_night_id=game_night.id) }}" method="POST" id="editGameNightForm">
  <div class="form-group">
    <label for="date">Date:</label>
    <input type="date" name="date" id="date" class="form-control" value="{{ game_night.date.strftime('%Y-%m-%d') }}" required>
  </div>

  <div class="form-group">
    <label for="notes">Notes:</label>
    <textarea name="notes" id="notes" rows="4" class="form-control">{{ game_night.notes }}</textarea>
  </div>

  <div class="attendee-form-section">
    <h3>Attendees:</h3>
    <input type="text" id="searchBox" class="form-control" placeholder="Search for a name..." autocomplete="off" />
    
    <div id="attendeesContainer" class="attendees-container"></div>

    <div id="pagination" class="pagination-controls">
      <button type="button" id="prevPage" class="pagination-button">Previous</button>
      <span id="pageInfo" class="pagination-info"></span>
      <button type="button" id="nextPage" class="pagination-button">Next</button>
    </div>

    <div id="selectedCount" class="selected-count">0 Attendees Selected</div>
  </div>

  <form action="{{ url_for('game_night.edit_game_night', game_night_id=game_night.id) }}" method="POST">
    <!-- ... your other form fields ... -->
  
    <div class="form-actions">
      <button type="submit" class="btn btn--success">Save Changes</button>
  
      <form action="{{ url_for('game_night.delete_game_night', game_night_id=game_night.id) }}" method="POST" onsubmit="return confirm('Are you sure you want to delete this game night? This cannot be undone.');" class="inline-form">
        <button type="submit" class="btn btn--danger">Delete Game Night</button>
      </form>
  
      <a href="{{ url_for('game_night.view_game_night', game_night_id=game_night.id) }}" class="btn btn--primary">Back to Game Night</a>
    </div>
  </form>

<script>
  const people = [
    {% for person in people %}
      { id: {{ person.id }}, name: "{{ person.first_name }} {{ person.last_name }}" },
    {% endfor %}
  ];

  const currentAttendees = new Set([
    {% for id in current_attendees %}
      {{ id }},
    {% endfor %}
  ]);

  let filteredPeople = [...people];
  let currentPage = 1;
  const pageSize = 25;
  let highlightedIndex = 0;
  const selectedPeople = new Set(currentAttendees);

  const attendeesContainer = document.getElementById('attendeesContainer');
  const searchBox = document.getElementById('searchBox');
  const pageInfo = document.getElementById('pageInfo');
  const prevPage = document.getElementById('prevPage');
  const nextPage = document.getElementById('nextPage');

  function updateSelectedCount() {
    const count = selectedPeople.size;
    const text = `${count} Attendee${count !== 1 ? 's' : ''} Selected`;
    document.getElementById('selectedCount').textContent = text;
  }

  function renderAttendees() {
    attendeesContainer.innerHTML = '';
    const start = (currentPage - 1) * pageSize;
    const pagePeople = filteredPeople.slice(start, start + pageSize);

    if (pagePeople.length === 0 && currentPage > 1) {
      currentPage--;
      renderAttendees();
      return;
    }

    pagePeople.forEach((person, index) => {
      const label = document.createElement('label');
      label.className = 'attendee__label';
      label.dataset.index = index;

      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.name = 'attendees';
      checkbox.value = person.id;
      checkbox.className = 'attendee__checkbox';

      if (selectedPeople.has(person.id)) {
        checkbox.checked = true;
        label.classList.add('attendee__label--selected');
      }

      checkbox.addEventListener('change', () => {
        if (checkbox.checked) {
          selectedPeople.add(person.id);
        } else {
          selectedPeople.delete(person.id);
        }
        updateSelectedCount();
        renderAttendees();
      });

      label.appendChild(checkbox);
      label.appendChild(document.createTextNode(' ' + person.name));
      attendeesContainer.appendChild(label);
    });

    pageInfo.textContent = `Page ${currentPage} of ${Math.ceil(filteredPeople.length / pageSize)}`;
    highlightTopMatch();
    updateSelectedCount();
  }

  function updateFilter() {
    const searchTerm = searchBox.value.toLowerCase();
    filteredPeople = people.filter(person => person.name.toLowerCase().includes(searchTerm));
    currentPage = 1;
    highlightedIndex = 0;
    renderAttendees();
  }

  function highlightTopMatch() {
    const labels = attendeesContainer.querySelectorAll('label');
    labels.forEach(label => {
      const value = Number(label.querySelector('input').value);
      label.classList.toggle('attendee__label--selected', selectedPeople.has(value));
      label.classList.remove('attendee__label--highlighted');
    });

    if (labels.length > 0 && labels[highlightedIndex]) {
      labels[highlightedIndex].scrollIntoView({ block: "nearest" });
      labels[highlightedIndex].classList.add('attendee__label--highlighted');
    }
  }

  searchBox.addEventListener('input', updateFilter);

  prevPage.addEventListener('click', () => {
    if (currentPage > 1) {
      currentPage--;
      highlightedIndex = 0;
      renderAttendees();
    }
  });

  nextPage.addEventListener('click', () => {
    if (currentPage * pageSize < filteredPeople.length) {
      currentPage++;
      highlightedIndex = 0;
      renderAttendees();
    }
  });

  searchBox.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      const person = filteredPeople[(currentPage - 1) * pageSize + highlightedIndex];
      if (person) {
        if (e.shiftKey) {
          selectedPeople.delete(person.id);
        } else {
          selectedPeople.add(person.id);
        }
        searchBox.value = '';
        updateFilter();
        searchBox.focus();
      }
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (highlightedIndex < Math.min(pageSize, filteredPeople.length - (currentPage - 1) * pageSize) - 1) {
        highlightedIndex++;
        highlightTopMatch();
      }
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (highlightedIndex > 0) {
        highlightedIndex--;
        highlightTopMatch();
      }
    }
  });

  document.getElementById('editGameNightForm').addEventListener('submit', (e) => {
    document.querySelectorAll('input[name="attendees"][type="hidden"]').forEach(el => el.remove());
    selectedPeople.forEach(id => {
      const hiddenInput = document.createElement('input');
      hiddenInput.type = 'hidden';
      hiddenInput.name = 'attendees';
      hiddenInput.value = id;
      document.getElementById('editGameNightForm').appendChild(hiddenInput);
    });
  });

  renderAttendees();
</script>
{% endblock %}
