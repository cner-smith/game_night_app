{% extends "base.html" %} {% block title %}Edit Game Night{% endblock %} {%
block content %}
<h1>Edit Game Night</h1>

<form
  action="{{ url_for('game_night.edit_game_night', game_night_id=game_night.id) }}"
  method="POST"
>
  <label for="date">Date:</label>
  <input
    type="date"
    name="date"
    value="{{ game_night.date.strftime('%B %d, %Y') }}"
    required
  /><br /><br />

  <label for="notes">Notes:</label><br />
  <textarea name="notes" rows="4" cols="50">{{ game_night.notes }}</textarea
  ><br /><br />

  <h3>Attendees:</h3>
  {% for person in people %}
  <input
    type="checkbox"
    name="attendees"
    value="{{ person.id }}"
    {%
    if
    person.id
    in
    current_attendees
    %}checked{%
    endif
    %}
  />
  {{ person.first_name }} {{ person.last_name }}<br />
  {% else %}
  <p>
    No people found.
    <a href="{{ url_for('admin.add_person') }}">Add a person</a>
  </p>
  {% endfor %}
  <br />
  <button type="submit">Save Changes</button>
</form>
<form
  action="{{ url_for('game_night.delete_game_night', game_night_id=game_night.id) }}"
  method="POST"
  onsubmit="return confirm('Are you sure you want to delete this game night? This cannot be undone.');"
>
  <button type="submit" class="btn-delete-game-night">Delete Game Night</button>
</form>
<br />
<a
  href="{{ url_for('game_night.view_game_night', game_night_id=game_night.id) }}"
  >Back to Game Night</a
>
{% endblock %}
