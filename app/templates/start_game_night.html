{% extends "base.html" %} {% block title %}Start Game Night{% endblock %} {%
block content %}
<h1>Start a New Game Night</h1>

<form
  action="{{ url_for('game_night.start_game_night') }}"
  method="POST"
  id="startGameNightForm"
>
  <div class="form-group">
    <label for="dateInput">Date:</label>
    <input
      type="date"
      name="date"
      id="dateInput"
      class="form-control"
      required
    />
  </div>

  <div class="form-group">
    <label for="notesInput">Notes:</label>
    <textarea
      name="notes"
      id="notesInput"
      rows="4"
      class="form-control"
    ></textarea>
  </div>

  <div class="attendee-form-section">
    <h3>Attendees:</h3>
    <input
      type="text"
      id="searchBox"
      class="form-control"
      placeholder="Search for a name..."
      autocomplete="off"
    />

    <div id="attendeesContainer" class="attendees-container">
      <!-- JavaScript will inject attendee checkboxes -->
    </div>

    <div id="pagination" class="pagination-controls">
      <button type="button" id="prevPage" class="pagination-button">
        Previous
      </button>
      <span id="pageInfo" class="pagination-info"></span>
      <button type="button" id="nextPage" class="pagination-button">
        Next
      </button>
    </div>

    <div id="selectedCount" class="selected-count">0 Attendees Selected</div>
  </div>

  <div class="form-actions">
    <button type="submit" class="btn btn--success">Start Game Night</button>
    <a href="{{ url_for('main.index') }}" class="btn btn--primary"
      >Back to Home</a
    >
  </div>
</form>

<script>
  function setupTagAutocomplete(
    inputId,
    tagContainerId,
    hiddenInputName,
    allItems
  ) {
    const input = document.getElementById(inputId);
    const tagContainer = document.getElementById(tagContainerId);
    const form = input.closest("form");

    let selected = [];
    let filtered = [...allItems];
    let highlightedIndex = 0;

    input.addEventListener("input", () => {
      const query = input.value.toLowerCase().trim();
      filtered = allItems.filter((i) => i.name.toLowerCase().includes(query));
      renderDropdown();
    });

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        const selectedItem = filtered[highlightedIndex];
        if (selectedItem && !selected.some((s) => s.id === selectedItem.id)) {
          selected.push(selectedItem);
          input.value = "";
          renderTags();
          renderDropdown();
        }
      }
    });

    function renderDropdown() {
      let dropdown = document.getElementById(`${inputId}-dropdown`);
      if (!dropdown) {
        dropdown = document.createElement("div");
        dropdown.id = `${inputId}-dropdown`;
        dropdown.classList.add("autocomplete-dropdown");
        input.insertAdjacentElement("afterend", dropdown);
      }
      dropdown.innerHTML = "";

      if (filtered.length > 0 && input.value.length >= 1) {
        const item = filtered[0];
        const div = document.createElement("div");
        div.textContent = item.name;
        div.classList.add("autocomplete-option");
        div.addEventListener("click", () => {
          selected.push(item);
          input.value = "";
          renderTags();
          dropdown.innerHTML = "";
        });
        dropdown.appendChild(div);
      }
    }

    function renderTags() {
      tagContainer.innerHTML = "";
      form
        .querySelectorAll(`input[name="${hiddenInputName}"]`)
        .forEach((i) => i.remove());

      selected.forEach((item) => {
        const tag = document.createElement("span");
        tag.classList.add("tag");
        tag.textContent = item.name;

        const removeBtn = document.createElement("button");
        removeBtn.textContent = "×";
        removeBtn.type = "button";
        removeBtn.addEventListener("click", () => {
          selected = selected.filter((i) => i.id !== item.id);
          renderTags();
        });

        tag.appendChild(removeBtn);
        tagContainer.appendChild(tag);

        const hiddenInput = document.createElement("input");
        hiddenInput.type = "hidden";
        hiddenInput.name = hiddenInputName;
        hiddenInput.value = item.id;
        form.appendChild(hiddenInput);
      });
    }

    document.addEventListener("click", (e) => {
      if (!input.contains(e.target)) {
        const dropdown = document.getElementById(`${inputId}-dropdown`);
        if (dropdown) dropdown.remove();
      }
    });
  }

  document.addEventListener("DOMContentLoaded", async () => {
    const gameList = await fetch("/games/autocomplete").then((r) => r.json());
    const personList = await fetch("/people/autocomplete").then((r) =>
      r.json()
    );

    setupTagAutocomplete("game-search", "game-tags", "game_ids", gameList);
    setupTagAutocomplete(
      "opponent-search",
      "opponent-tags",
      "opponent_ids",
      personList
    );
  });
</script>
{% endblock %}
