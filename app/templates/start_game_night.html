{% extends "base.html" %} {% block title %}Start Game Night{% endblock %} {%
block content %}
<h1>Start a New Game Night</h1>

<form
  action="{{ url_for('game_night.start_game_night') }}"
  method="POST"
  id="startGameNightForm"
>
  <div class="form-group">
    <label for="dateInput">Date:</label>
    <input
      type="date"
      name="date"
      id="dateInput"
      class="form-control"
      required
    />
  </div>

  <div class="form-group">
    <label for="notesInput">Notes:</label>
    <textarea
      name="notes"
      id="notesInput"
      rows="4"
      class="form-control"
    ></textarea>
  </div>

  <div class="attendee-form-section">
    <h3>Attendees:</h3>
    <input
      type="text"
      id="searchBox"
      class="form-control"
      placeholder="Search for a name..."
      autocomplete="off"
    />

    <div id="attendeesContainer" class="attendees-container">
      <!-- JavaScript will inject attendee checkboxes -->
    </div>

    <div id="pagination" class="pagination-controls">
      <button type="button" id="prevPage" class="pagination-button">
        Previous
      </button>
      <span id="pageInfo" class="pagination-info"></span>
      <button type="button" id="nextPage" class="pagination-button">
        Next
      </button>
    </div>

    <div id="selectedCount" class="selected-count">0 Attendees Selected</div>
  </div>

  <div class="form-actions">
    <button type="submit" class="btn btn--success">Start Game Night</button>
    <a href="{{ url_for('main.index') }}" class="btn btn--primary"
      >Back to Home</a
    >
  </div>
</form>

<script>
  document.addEventListener("DOMContentLoaded", async () => {
    const games = await fetch("/games/autocomplete").then((r) => r.json());
    const opponents = await fetch("/people/autocomplete").then((r) => r.json());

    setupTagSearch("game-search", "game-tags", "game_ids", games);
    setupTagSearch(
      "opponent-search",
      "opponent-tags",
      "opponent_ids",
      opponents
    );
  });

  function setupTagSearch(inputId, tagContainerId, hiddenName, allItems) {
    const input = document.getElementById(inputId);
    const tagContainer = document.getElementById(tagContainerId);
    const form = input.closest("form");
    let selected = [];
    let matchIndex = 0;

    input.addEventListener("input", () => renderSuggestion());

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        const matches = getMatches();
        const selectedItem = matches[matchIndex];
        if (selectedItem && !selected.some((i) => i.id === selectedItem.id)) {
          selected.push(selectedItem);
          input.value = "";
          renderTags();
          clearSuggestion();
        }
      }
    });

    function getMatches() {
      const q = input.value.toLowerCase().trim();
      return allItems.filter((i) => i.name.toLowerCase().includes(q));
    }

    function renderSuggestion() {
      clearSuggestion();

      const matches = getMatches();
      if (matches.length === 0 || input.value.length < 1) return;

      const suggestionBox = document.createElement("div");
      suggestionBox.className = "autocomplete-dropdown";
      suggestionBox.id = `${inputId}-dropdown`;

      const item = matches[0];
      const option = document.createElement("div");
      option.className = "autocomplete-option";
      option.textContent = item.name;
      option.addEventListener("click", () => {
        selected.push(item);
        input.value = "";
        renderTags();
        clearSuggestion();
      });

      suggestionBox.appendChild(option);
      input.parentNode.appendChild(suggestionBox);
    }

    function clearSuggestion() {
      const box = document.getElementById(`${inputId}-dropdown`);
      if (box) box.remove();
    }

    function renderTags() {
      tagContainer.innerHTML = "";
      form
        .querySelectorAll(`input[name="${hiddenName}"]`)
        .forEach((e) => e.remove());

      selected.forEach((item) => {
        const tag = document.createElement("span");
        tag.className = "tag";
        tag.textContent = item.name;

        const btn = document.createElement("button");
        btn.type = "button";
        btn.textContent = "×";
        btn.addEventListener("click", () => {
          selected = selected.filter((i) => i.id !== item.id);
          renderTags();
        });

        tag.appendChild(btn);
        tagContainer.appendChild(tag);

        const hidden = document.createElement("input");
        hidden.type = "hidden";
        hidden.name = hiddenName;
        hidden.value = item.id;
        form.appendChild(hidden);
      });
    }

    // Click-away behavior
    document.addEventListener("click", (e) => {
      if (!input.contains(e.target)) clearSuggestion();
    });
  }
</script>
{% endblock %}
