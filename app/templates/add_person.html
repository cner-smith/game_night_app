{% extends "base.html" %}

{% block title %}Add Person{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">

  <h1 class="text-2xl font-bold text-stone-800 mb-6">Add a Person</h1>

  <div class="bg-white rounded-xl border border-stone-200 shadow-sm p-5">
    <form action="{{ url_for('admin.add_person') }}" method="POST" class="space-y-4">

      <div>
        <label for="first_name" class="block text-sm font-medium text-stone-700 mb-1">First Name</label>
        <input type="text" id="first_name" name="first_name" required
               class="w-full rounded-lg border border-stone-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent">
      </div>

      <div>
        <label for="last_name" class="block text-sm font-medium text-stone-700 mb-1">Last Name</label>
        <input type="text" id="last_name" name="last_name" required
               class="w-full rounded-lg border border-stone-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent">
      </div>

      <div class="flex items-center gap-3 pt-2">
        <button type="submit" class="inline-flex items-center rounded-lg bg-red-600 px-4 py-2 text-sm font-medium text-white hover:bg-red-700 transition-colors">
          Add Person
        </button>
        <a href="{{ url_for('admin.admin_page') }}" class="text-sm text-stone-600 hover:text-stone-800 transition-colors">
          Back to Admin Panel
        </a>
      </div>

    </form>
  </div>

</div>
{% endblock %}
